<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI 自動化診断 | DX Partners</title>
  <meta name="description" content="5〜10分で、自社業務の自動化ポテンシャルを数字で見える化。Notion × AI 業務改善コンサルが提供する無料診断。" />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <style>
    :root {
      --ink: #1A1A1A;
      --ink-soft: #2E2E2E;
      --paper: #FAFAF7;
      --cream: #F5F0E1;
      --card: #FFFFFF;
      --accent: #B8956A;
      --line: rgba(26,26,26,0.10);
      --muted: rgba(26,26,26,0.55);
    }
    html, body { margin: 0; padding: 0; background: var(--paper); font-family: 'Noto Sans JP', system-ui, sans-serif; color: var(--ink); -webkit-tap-highlight-color: transparent; }
    * { box-sizing: border-box; }

    .dx-root { background: var(--paper); min-height: 100vh; padding-bottom: 40px; }
    .dx-serif { font-family: 'Noto Serif JP', 'Times New Roman', serif; }
    .dx-mono  { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }

    .dx-header { position: sticky; top: 0; z-index: 10; background: rgba(250,250,247,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(26,26,26,0.08); }
    .dx-header-inner { padding: 14px 20px 12px; display: flex; align-items: center; justify-content: space-between; max-width: 480px; margin: 0 auto; }
    .dx-logo { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; }
    .dx-logo-mark { width: 22px; height: 22px; background: var(--ink); color: var(--paper); display: grid; place-items: center; font-family: 'Noto Serif JP', serif; font-size: 12px; font-weight: 700; border-radius: 2px; }
    .dx-step-badge { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
    .dx-step-badge b { color: var(--ink); font-weight: 700; }

    .dx-progress { height: 2px; background: rgba(26,26,26,0.06); position: relative; overflow: hidden; }
    .dx-progress-bar { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); transition: width 480ms cubic-bezier(0.22, 1, 0.36, 1); }

    .dx-page { padding: 32px 20px 40px; max-width: 480px; margin: 0 auto; }

    .dx-eyebrow { font-size: 11px; letter-spacing: 0.18em; color: var(--accent); font-weight: 600; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .dx-eyebrow::before { content: ''; width: 18px; height: 1px; background: var(--accent); }

    .dx-h1 { font-size: 28px; line-height: 1.4; font-weight: 700; letter-spacing: 0.01em; margin: 0 0 16px; text-wrap: pretty; }
    .dx-h2 { font-size: 22px; line-height: 1.5; font-weight: 700; letter-spacing: 0.01em; margin: 0 0 12px; text-wrap: pretty; }
    .dx-sub { font-size: 14px; line-height: 1.7; color: var(--muted); margin: 0 0 28px; }

    .dx-intro-card { background: var(--ink); color: var(--cream); padding: 36px 24px 28px; border-radius: 4px; margin: -8px -4px 24px; position: relative; overflow: hidden; }
    .dx-intro-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
    .dx-intro-card .dx-eyebrow { color: var(--accent); }
    .dx-intro-card .dx-h1 { color: var(--cream); font-size: 26px; }
    .dx-intro-card .dx-sub { color: rgba(245,240,225,0.72); margin-bottom: 20px; }

    .dx-stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding-top: 20px; border-top: 1px solid rgba(245,240,225,0.15); }
    .dx-stat .num { font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 700; color: var(--accent); line-height: 1; }
    .dx-stat .num small { font-size: 12px; margin-left: 2px; opacity: 0.85; }
    .dx-stat .lbl { font-size: 10px; letter-spacing: 0.08em; color: rgba(245,240,225,0.6); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

    .dx-cta-primary { width: 100%; min-height: 56px; background: var(--accent); color: var(--ink); border: none; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.04em; border-radius: 2px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 16px rgba(184,149,106,0.28); cursor: pointer; transition: transform 200ms, box-shadow 200ms, opacity 200ms; }
    .dx-cta-primary:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(184,149,106,0.22); }
    .dx-cta-primary[disabled] { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .dx-cta-primary .arrow { font-size: 18px; }

    .dx-cta-secondary { width: 100%; min-height: 48px; background: transparent; color: var(--ink); border: 1px solid var(--line); font-family: inherit; font-size: 14px; font-weight: 600; border-radius: 2px; cursor: pointer; transition: all 180ms; }
    .dx-cta-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .dx-meta { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 18px; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; flex-wrap: wrap; }
    .dx-meta span { display: inline-flex; align-items: center; gap: 6px; }
    .dx-meta span::before { content: '✓'; color: var(--accent); font-weight: 700; }

    .dx-trust { padding: 16px 18px; background: var(--cream); border-left: 3px solid var(--accent); font-size: 12px; line-height: 1.7; color: rgba(26,26,26,0.75); }
    .dx-trust b { color: var(--ink); }

    .dx-question-num { font-family: 'Noto Serif JP', serif; font-size: 13px; color: rgba(26,26,26,0.45); letter-spacing: 0.04em; margin-bottom: 10px; }
    .dx-question-num b { color: var(--ink); font-size: 15px; margin-right: 4px; }

    .dx-options { display: flex; flex-direction: column; gap: 10px; }
    .dx-option { width: 100%; min-height: 64px; padding: 16px 18px; background: var(--card); border: 1px solid rgba(26,26,26,0.10); border-radius: 3px; text-align: left; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 180ms; font-family: inherit; color: inherit; }
    .dx-option:hover, .dx-option.is-selected { border-color: var(--accent); background: #FFFDF7; transform: translateX(2px); }
    .dx-option.is-selected { box-shadow: -2px 0 0 var(--accent), 0 2px 12px rgba(184,149,106,0.18); }
    .dx-option-bullet { width: 28px; height: 28px; flex: 0 0 28px; border: 1px solid rgba(26,26,26,0.18); border-radius: 50%; display: grid; place-items: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: rgba(26,26,26,0.6); transition: all 180ms; }
    .dx-option:hover .dx-option-bullet, .dx-option.is-selected .dx-option-bullet { background: var(--accent); border-color: var(--accent); color: var(--ink); }
    .dx-option-body { flex: 1; min-width: 0; }
    .dx-option-label { font-size: 15px; font-weight: 600; line-height: 1.4; display: block; }
    .dx-option-sub { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; display: block; }
    .dx-option-arrow { color: rgba(26,26,26,0.25); font-size: 16px; transition: all 180ms; }
    .dx-option:hover .dx-option-arrow, .dx-option.is-selected .dx-option-arrow { color: var(--accent); transform: translateX(3px); }

    .dx-checkbox-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--card); border: 1px solid rgba(26,26,26,0.10); border-radius: 3px; cursor: pointer; transition: all 180ms; }
    .dx-checkbox-row:hover, .dx-checkbox-row.is-checked { border-color: var(--accent); background: #FFFDF7; }
    .dx-checkbox-row.is-checked { box-shadow: -2px 0 0 var(--accent); }
    .dx-checkbox-input { width: 18px; height: 18px; flex: 0 0 18px; accent-color: var(--accent); cursor: pointer; }
    .dx-checkbox-label { font-size: 14px; font-weight: 500; line-height: 1.4; }

    .dx-back { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 13px; color: rgba(26,26,26,0.55); padding: 12px 0; margin-bottom: 16px; letter-spacing: 0.04em; }
    .dx-back:hover { color: var(--ink); }

    .dx-field-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; color: var(--ink); }
    .dx-input, .dx-select { width: 100%; min-height: 56px; padding: 14px 16px; background: var(--card); border: 1px solid rgba(26,26,26,0.18); border-radius: 3px; font-family: inherit; font-size: 16px; color: var(--ink); transition: border-color 180ms; }
    .dx-input:focus, .dx-select:focus { outline: none; border-color: var(--accent); box-shadow: -2px 0 0 var(--accent); }
    .dx-input::placeholder { color: rgba(26,26,26,0.35); }

    .dx-section-title { font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 700; margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid rgba(26,26,26,0.1); display: flex; align-items: center; gap: 8px; }
    .dx-section-title::before { content: ''; width: 4px; height: 14px; background: var(--accent); }

    @keyframes dx-fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .dx-anim { animation: dx-fade-up 360ms cubic-bezier(0.22, 1, 0.36, 1) both; }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  </style>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    window.__LIFF_ID__ = '';
    window.__PUSH_API__ = '';
  </script>
</head>
<body>
  <div id="root" class="dx-root">
    <header class="dx-header">
      <div class="dx-header-inner">
        <div class="dx-logo">
          <span class="dx-logo-mark dx-serif">D</span>
          <span>DX&nbsp;PARTNERS</span>
        </div>
        <div class="dx-step-badge dx-mono" id="step-indicator">INTRO</div>
      </div>
      <div class="dx-progress">
        <div class="dx-progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
    </header>

    <main id="screen-root" class="dx-page"></main>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
